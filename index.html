<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU | Interactive Digital Profile</title>
    <style>
        /* CSS SECTION - 150+ lines of design and animations
        */
        :root {
            --primary-gold: #c4a47c;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Overlay Layer */
        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        /* Top Navigation Bar */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .music-controller {
            position: relative;
            cursor: pointer;
        }

        #musicToggle {
            background: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        #musicToggle.playing {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 0 25px rgba(196, 164, 124, 0.6);
            transform: scale(1.05);
        }

        /* Main Container */
        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 120px 20px 40px 20px;
        }

        /* Profile Section */
        .profile-wrapper {
            text-align: center;
            animation: fadeInDown 1.2s ease-out;
        }

        .avatar-circle {
            width: 180px;
            height: 180px;
            border: 4px solid #fff;
            border-radius: 50%;
            padding: 6px;
            margin: 0 auto 25px;
            position: relative;
            transition: transform 0.5s ease;
        }

        .avatar-circle:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: #222;
        }

        .user-name {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .action-btn {
            display: inline-block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px 70px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background: #f8f8f8;
        }

        /* Animated Info Grid */
        .dynamic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            width: 100%;
        }

        .info-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 30px 15px;
            border-radius: 28px;
            text-align: center;
            opacity: 0;
            /* Bounce Animation Logic */
            animation: bounceInUp 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-gold);
            transform: translateY(-5px);
            transition: 0.3s;
        }

        .card-label {
            color: var(--primary-gold);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 1.2px;
        }

        .card-value {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Copyright Footer */
        .site-footer {
            margin-top: 30px;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Keyframes for Smooth Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceInUp {
            0% { opacity: 0; transform: translateY(100px); }
            60% { opacity: 1; transform: translateY(-15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Animation Delays */
        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 0.8s; }
        .delay-4 { animation-delay: 1.0s; }

        /* Responsive */
        @media (max-width: 400px) {
            .avatar-circle { width: 150px; height: 150px; }
            .user-name { font-size: 20px; }
            .card-value { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <audio id="mainAudio" src="music.mp3"></audio>

    <nav class="top-navbar">
        <div class="brand-logo">ISU</div>
        <div class="music-controller">
            <button id="musicToggle">MUSIC</button>
        </div>
    </nav>

    <div class="main-content">
        <section class="profile-wrapper">
            <div class="avatar-circle">
                <img src="avatar.jpg" alt="Umirova Sevara">
            </div>
            <h1 class="user-name">UMIROVA SEVARA<br>ITOLMASOVNA</h1>
            <a href="https://t.me/yujin_studio" target="_blank" class="action-btn">TELEGRAM</a>
        </section>

        <section class="dynamic-grid">
            <div class="info-card delay-1">
                <span class="card-label">KASBI</span>
                <span class="card-value">O'qituvchi</span>
            </div>
            <div class="info-card delay-2">
                <span class="card-label">SOHASI</span>
                <span class="card-value">Dublyajchi</span>
            </div>
            <div class="info-card delay-3">
                <span class="card-label">TUG'ILGAN YILI</span>
                <span class="card-value">09.12.2003</span>
            </div>
            <div class="info-card delay-4">
                <span class="card-label">HOBBY</span>
                <span class="card-value">Rassomchilik</span>
            </div>
        </section>

        <footer class="site-footer">
            &copy; 2026 Abdubakr Development. All Rights Reserved.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('mainAudio');
            const toggleBtn = document.getElementById('musicToggle');

            // Music Control Logic
            const togglePlay = () => {
                if (audio.paused) {
                    audio.play().then(() => {
                        toggleBtn.classList.add('playing');
                        toggleBtn.innerText = 'PAUSE';
                    }).catch(error => {
                        console.log("Brauzer avtomatik ijroni blokladi:", error);
                    });
                } else {
                    audio.pause();
                    resetButton();
                }
            };

            const resetButton = () => {
                toggleBtn.classList.remove('playing');
                toggleBtn.innerText = 'MUSIC';
            };

            // Event Listeners
            toggleBtn.addEventListener('click', togglePlay);

            // Musiqa tugashi bilan holatni qaytarish
            audio.addEventListener('ended', () => {
                resetButton();
                console.log("Musiqa yakunlandi, tugma holati qaytarildi.");
            });

            // Card interaktivligi (Hover effekti uchun qo'shimcha animatsiya yordami)
            const cards = document.querySelectorAll('.info-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', () => {
                    card.style.transition = "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)";
                });
            });
        });

        // Background parallax effekti (Ozroq harakat qo'shish uchun)
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            document.body.style.backgroundPosition = `${50 + moveX}% ${50 + moveY}%`;
        });
    </script>

</body>
</html>
