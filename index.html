<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 TITLE -->
    <title>ISU | PRO OVOZ SOHIBASI</title>

    <!-- 📱 TELEGRAM / SOCIAL PREVIEW (OG TAGS) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ISU | PRO OVOZ SOHIBASI">
    <meta property="og:description" content="PRO OVOZ SOHIBASI — zamonaviy, interaktiv va premium dizayn.">
    <meta property="og:image" content="https://isu.fastora.uz/avatar.jpg">
    <meta property="og:url" content="https://isu.fastora.uz">
    <meta property="og:site_name" content="ISU Profile">

    <!-- 🐦 TWITTER PREVIEW (Telegram ham o‘qiydi) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ISU | Interactive Digital Profile">
    <meta name="twitter:description" content="Zamonaviy digital profile UI design.">
    <meta name="twitter:image" content="https://isu.fastora.uz/avatar.jpg">

    <!-- 🎨 FAVICON -->
    <link rel="icon" href="avatar.jpg" type="image/x-icon">

    <!-- ⚡ THEME COLOR (mobile browser UI uchun) -->
    <meta name="theme-color" content="#0a0a0a">

    <!-- 🔤 FONT (optional premium look) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* CSS SECTION - 150+ lines of design and animations
        */
        :root {
            --primary-gold: #c4a47c;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a url('bg1.jpg') no-repeat center center fixed;
            background-size: cover;

            min-height: 100vh;   /* height emas */
            width: 100vw;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow-x: hidden;  /* faqat horizontalni yopamiz */
            overflow-y: auto;    /* vertical scroll ON */

            color: var(--text-main);
        }

        /* Overlay Layer */
        .overlay {
            position: fixed;
            inset: 0;

            background: radial-gradient(
                circle at center,
                rgba(0,0,0,0.35) 0%,
                rgba(0,0,0,0.85) 100%
            );

            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(10px);

            z-index: -1;
        }

        /* Top Navigation Bar */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px; /* 80px → 55px */
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px; /* 30px → 18px */
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;

            background: linear-gradient(
                270deg,
                #ffffff,
                #c4a47c,
                #ffffff,
                #c4a47c
            );

            background-size: 400% 400%;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: gradientMove 6s ease infinite;
        }

        .music-controller {
            position: relative;
            cursor: pointer;
        }

        #musicToggle {
            background: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        #musicToggle.playing {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 0 25px rgba(196, 164, 124, 0.6);
            transform: scale(1.05);
        }

        /* Main Container */
        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 15px 40px 15px; /* Yon tomondan paddingni kamaytirdik */
        }

        /* Profile Section */
        .profile-wrapper {
            text-align: center;
            animation: fadeInDown 1.2s ease-out;

            margin-bottom: 25px; /* <-- yangi bo‘sh joy */
        }

        .avatar-circle {
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;

            position: relative; /* MUHIM */
            border-radius: 50%;
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
        } 

        .avatar-circle::before {
            content: "";
            position: absolute;
            inset: -4px; /* ring tashqariga chiqadi */

            border-radius: 50%;

            background: conic-gradient(
                #feda75,
                #fa7e1e,
                #d62976,
                #962fbf,
                #4f5bd5,
                #feda75
            );

            animation: spinRing 4s linear infinite;

            z-index: -1;
        }

        .avatar-circle::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: #0a0a0a; /* body rangiga mos */
            border-radius: 50%;
            z-index: -1;
        }

        .avatar-circle img {
            position: relative;
            z-index: 1;

            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .user-name {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .action-btn {
            display: inline-block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px 70px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background: #f8f8f8;
        }

        /* Animated Info Grid */
        .dynamic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Aniq 2 ustun */
            gap: 15px;
            width: 100%;
            margin-bottom: 20px; /* Video bo'limidan ajratish */
        }

        .info-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            padding: 22px 14px;
            border-radius: 22px;
            text-align: center;

            /* start state */
            opacity: 0;
            transform: translateY(25px) scale(0.98);

            /* smooth mobile-friendly animation */
            animation: cardSoftIn 0.8s ease-out forwards;

            transition: all 0.35s ease;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-gold);
            transform: translateY(-5px);
            transition: 0.3s;
        }
        .info-card {
            animation:
                cardSoftIn 0.8s ease-out forwards,
                floatY 5s ease-in-out infinite;
        }
        .card-label {
            color: var(--primary-gold);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 1.2px;
        }

        .card-value {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Copyright Footer */
        .site-footer {
            margin-top: 30px;
            padding: 12px 18px;

            font-size: 11px;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;

            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            position: relative;
            overflow: hidden;

            animation: footerFade 1s ease-out forwards;
            transition: all 0.3s ease;
        }
        .bg-layer {
            position: fixed;
            inset: 0;

            background: url('bg.jpg') no-repeat center center;
            background-size: cover;

            transform: scale(1.1); /* edges yo‘q bo‘lib ketmasin */
            z-index: -2;

            will-change: transform;
        }
        @keyframes cardSoftIn {
            0% {
                opacity: 0;
                transform: translateY(25px) scale(0.98);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Keyframes for Smooth Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceInUp {
            0% { opacity: 0; transform: translateY(100px); }
            60% { opacity: 1; transform: translateY(-15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatY {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* Animation Delays */
        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 0.8s; }
        .delay-4 { animation-delay: 1.0s; }

        /* Responsive */
        @media (max-width: 380px) {
            .dynamic-grid {
                gap: 10px;
            }
            .card-value {
                font-size: 14px; /* Matn sig'ishi uchun */
            }
            .user-name {
                font-size: 20px;
            }
        }

        @keyframes spinRing {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

/* --- Oldingi .hearts-container va .heart ni o'chiring va bularni qo'shing --- */

        .hearts-container {
            position: fixed; /* Butun ekranni qoplash uchun fixed */
            inset: 0;
            pointer-events: none; /* Tugmalarni bosishga xalaqit bermasligi uchun */
            z-index: 9999; /* Hamma narsadan ustun turishi uchun */
            overflow: hidden;
        }

        .heart {
            position: absolute;
            /* Boshlang'ich o'lcham (JS da o'zgartiriladi) */
            font-size: 30px; 
            /* Instagram ranglari gradienti */
            background: radial-gradient(circle at 30% 30%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Yaxshiroq ko'rinish uchun ozgina soya */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
            
            user-select: none;
            opacity: 0;
            
            /* Faqat aylanish va kattalashish uchun CSS (harakat JS da) */
            transform: translate(-50%, -50%) rotate(var(--rotate)) scale(var(--scale));
            
            /* Paydo bo'lish va yo'qolish effekti */
            transition: opacity 0.2s ease-out;
        }

        /* Paydo bo'lgandagi holat */
        .heart.fade-in {
            opacity: 1;
        }

        /* Yo'qolayotgandagi holat */
        .heart.fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-in; /* Sekinroq yo'qoladi */
        }

        /* random ranglar */
        .heart:nth-child(odd) {
            color: #ff4d6d;
        }
        .heart:nth-child(even) {
            color: #ff1a1a;
        }

        @keyframes heartFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--rotate)) scale(0.5);
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                /* Yurakchalar har tomonga tarqalishi uchun */
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--rotate)) scale(1.5);
            }
        }

        /* Video Section Dizayni */
        .video-slider-section {
            width: 100%; 
            max-width: 100%; /* Konteynerdan chiqib ketmasligi uchun */
            margin: 20px 0;
            padding: 0;
            opacity: 0;
            animation: cardSoftIn 0.8s ease-out 1.2s forwards;
            overflow: hidden; /* Gorizontal scroll chiqishini oldini oladi */
        }

        .swiper {
            width: 100%;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding-bottom: 40px;
        }

        .video-container {
            position: relative;
            width: 100%;
            /* 100% o'rniga 16:9 yoki videoga mos nisbat ishlatamiz */
            aspect-ratio: 9 / 16; /* TikTok/Reels formatidagi videolar uchun eng yaxshisi */
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 25px;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Videoni chekkalarsiz to'ldiradi */
        }

        /* Navigatsiya tugmalarini tillarang qilish */
        .swiper-button-next, .swiper-button-prev {
            color: var(--primary-gold) !important;
            background: rgba(0, 0, 0, 0.4);
            width: 40px !important;
            height: 40px !important;
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }

        .swiper-button-next::after, .swiper-button-prev::after {
            font-size: 18px !important;
            font-weight: bold;
        }

        .swiper-pagination-bullet {
            background: rgba(255, 255, 255, 0.3) !important;
            opacity: 1;
        }

        .swiper-pagination-bullet-active {
            background: var(--primary-gold) !important;
            box-shadow: 0 0 10px var(--primary-gold);
        }

    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="overlay"></div>


    <audio id="mainAudio" src="isu1.mp3"></audio>

    <nav class="top-navbar">
        <div class="brand-logo">ISU</div>
        <div class="music-controller">
            <button id="musicToggle">MUSIC</button>
        </div>
    </nav>

    <div class="main-content">
        <section class="profile-wrapper">
            <div class="avatar-circle">
                <img src="avatar.jpg" alt="Umirova Sevara">
                <div class="hearts-container"></div>
            </div>
            <h1 class="user-name">UMIROVA SEVARA<br>ITOLMASOVNA</h1>
            <a href="https://t.me/isu_umirovasevaraitolmasovna" target="_blank" class="action-btn">TELEGRAM</a>
        </section>

        <section class="dynamic-grid">
            <div class="info-card delay-1">
                <span class="card-label">KASBI</span>
                <span class="card-value">O'qituvchi</span>
            </div>
            <div class="info-card delay-2">
                <span class="card-label">SOHASI</span>
                <span class="card-value">Dublyajchi</span>
            </div>
            <div class="info-card delay-3">
                <span class="card-label">TUG'ILGAN YILI</span>
                <span class="card-value">09.12.2003</span>
            </div>
            <div class="info-card delay-4">
                <span class="card-label">HOBBY</span>
                <span class="card-value">Rassomchilik</span>
            </div>
        </section>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

        <section class="video-slider-section">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="video-container">
                            <video src="video1.mp4" poster="thumb1.jpg" playsinline controls></video>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="video-container">
                            <video src="ved2.mp4" poster="thumb.jpg" playsinline controls></video>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="video-container">
                            <video src="vedi3.mp4" poster="thumb3.jpg" playsinline controls></video>
                        </div>
                    </div>
                </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

        <footer class="site-footer">
            &copy; 2026 ISU uchun maxsus tayyorlandi.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- 1. PROFILDAGI YURAKCHALAR ANIMATSIYASI (GRAVITY BILAN) ---
            const avatar = document.querySelector('.avatar-circle');
            const container = document.querySelector('.hearts-container');

            const GRAVITY = 0.8; 
            const DRAG = 0.98;    
            const HEART_COUNT = 25; 

            avatar.addEventListener('click', (e) => {
                const rect = avatar.getBoundingClientRect();
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;

                for (let i = 0; i < HEART_COUNT; i++) {
                    createPhysicsHeart(startX, startY);
                }
            });

            function createPhysicsHeart(x, y) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.innerText = '❤';

                const rotate = (Math.random() - 0.5) * 120;
                const scale = 1.0 + Math.random() * 1.5; 

                heart.style.setProperty('--rotate', `${rotate}deg`);
                heart.style.setProperty('--scale', scale);
                heart.style.left = `${x}px`;
                heart.style.top = `${y}px`;

                container.appendChild(heart);

                let velX = (Math.random() - 0.5) * 40;  
                let velY = (Math.random() - 0.7) * 50;  

                let posX = x;
                let posY = y;

                requestAnimationFrame(() => heart.classList.add('fade-in'));

                function updateHeart() {
                    velY += GRAVITY;   
                    velX *= DRAG;      
                    velY *= DRAG;      

                    posX += velX;
                    posY += velY;

                    heart.style.left = `${posX}px`;
                    heart.style.top = `${posY}px`;

                    const isOffScreen = posY > window.innerHeight + 100 || posX < -100 || posX > window.innerWidth + 100;
                    
                    if (isOffScreen) {
                        heart.classList.remove('fade-in');
                        heart.classList.add('fade-out');
                        setTimeout(() => heart.remove(), 500);
                    } else {
                        requestAnimationFrame(updateHeart);
                    }
                }
                requestAnimationFrame(updateHeart);
            }


            // --- 2. MUSIQA BOSHQARUVI ---
            const audio = document.getElementById('mainAudio');
            const toggleBtn = document.getElementById('musicToggle');

            const togglePlay = () => {
                if (audio.paused) {
                    audio.play().then(() => {
                        toggleBtn.classList.add('playing');
                        toggleBtn.innerText = 'PAUSE';
                    }).catch(error => {
                        console.log("Brauzer avtomatik ijroni blokladi:", error);
                    });
                } else {
                    audio.pause();
                    resetMusicButton();
                }
            };

            const resetMusicButton = () => {
                toggleBtn.classList.remove('playing');
                toggleBtn.innerText = 'MUSIC';
            };

            toggleBtn.addEventListener('click', togglePlay);
            audio.addEventListener('ended', resetMusicButton);


            // --- 3. VIDEO SLIDER (SWIPER) VA AQLLI OVOZ NAZORATI ---
            // Video qo'yilganda musiqani o'chirish funksiyasi
            const stopMainMusic = () => {
                if (!audio.paused) {
                    audio.pause();
                    resetMusicButton();
                }
            };

            const swiper = new Swiper(".mySwiper", {
                effect: "cards", // "coverflow" o'rniga "cards" effekti mobil profil uchun juda chiroyli chiqadi
                grabCursor: true,
                initialSlide: 0,
                pagination: {
                    el: ".swiper-pagination",
                    dynamicBullets: true,
                },
                navigation: {
                    nextEl: ".swiper-button-next",
                    prevEl: ".swiper-button-prev",
                },
                on: {
                    slideChange: function () {
                        // Boshqa slaydga o'tganda videolarni to'xtatish
                        document.querySelectorAll('video').forEach(v => {
                            v.pause();
                            v.currentTime = 0; // Videoni boshiga qaytarish (ixtiyoriy)
                        });
                    }
                }
            });

            // Har bir videoga 'play' bo'lganda musiqani to'xtatish hodisasini biriktirish
            document.querySelectorAll('video').forEach(video => {
                video.addEventListener('play', stopMainMusic);
            });


            // --- 4. PARALLAX VA FON EFFEKTI ---
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                const bgLayer = document.querySelector('.bg-layer');
                if(bgLayer) {
                    bgLayer.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>

</body>
</html>
